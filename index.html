<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make 24</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --card: #1c1c2e;
    --card-selected: #2a2a4a;
    --gold: #f0c040;
    --gold-dim: #a08020;
    --gold-glow: rgba(240, 192, 64, 0.3);
    --red: #ff4060;
    --green: #40e080;
    --text: #e8e8f0;
    --text-dim: #888898;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(240, 192, 64, 0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(100, 60, 200, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(64, 224, 128, 0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Side reminders */
  .side-reminder {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 2;
    opacity: 0.5;
    transition: opacity 0.3s;
  }

  .side-reminder:hover { opacity: 0.85; }

  .side-reminder.left { left: 18px; align-items: flex-start; }
  .side-reminder.right { right: 18px; align-items: flex-end; }

  .side-reminder .factor {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gold);
    background: var(--surface);
    border: 1px solid rgba(240, 192, 64, 0.15);
    border-radius: 10px;
    padding: 8px 12px;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  .side-reminder .factor-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: -4px;
  }

  /* Hide side reminders on narrow screens, show inline version instead */
  @media (max-width: 760px) {
    .side-reminder { display: none; }
    .inline-reminder { display: flex !important; }
  }

  .inline-reminder {
    display: none;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeDown 0.6s ease-out 0.15s both;
  }

  .inline-reminder .factor {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
    background: var(--surface);
    border: 1px solid rgba(240, 192, 64, 0.15);
    border-radius: 10px;
    padding: 6px 12px;
    letter-spacing: 1px;
  }

  .header {
    text-align: center;
    animation: fadeDown 0.6s ease-out;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 3.2rem;
    background: linear-gradient(135deg, var(--gold) 0%, #ffe080 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
    line-height: 1;
  }

  .header p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stats {
    display: flex;
    gap: 24px;
    justify-content: center;
    animation: fadeDown 0.6s ease-out 0.1s both;
  }

  .stat { text-align: center; }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .cards {
    display: grid;
    gap: 12px;
    width: 100%;
    animation: fadeUp 0.5s ease-out 0.2s both;
    justify-content: center;
  }
  .cards.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .cards.cols-3 { grid-template-columns: repeat(3, 1fr); max-width: 400px; }
  .cards.cols-2 { grid-template-columns: repeat(2, 1fr); max-width: 280px; }
  .cards.cols-1 { grid-template-columns: 1fr; max-width: 140px; }

  .number-card {
    aspect-ratio: 3/4;
    background: var(--card);
    border: 2px solid transparent;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2.4rem;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .number-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.04), transparent 60%);
    pointer-events: none;
  }

  .number-card:hover:not(.disabled) {
    border-color: var(--gold-dim);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .number-card.selected {
    border-color: var(--gold);
    background: var(--card-selected);
    box-shadow: 0 0 20px var(--gold-glow);
    transform: translateY(-3px);
  }

  .number-card.disabled { cursor: default; }

  .number-card .corner {
    position: absolute;
    font-size: 0.65rem;
    color: var(--gold-dim);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .number-card .corner.tl { top: 8px; left: 10px; }
  .number-card .corner.br { bottom: 8px; right: 10px; transform: rotate(180deg); }

  .operators {
    display: flex;
    gap: 10px;
    justify-content: center;
    animation: fadeUp 0.5s ease-out 0.3s both;
  }

  .op-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    background: var(--surface);
    color: var(--gold);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .op-btn:hover:not(.disabled) {
    border-color: var(--gold);
    color: #ffe080;
    box-shadow: 0 0 16px var(--gold-glow);
    transform: scale(1.1);
  }

  .op-btn.disabled {
    opacity: 0.3;
    cursor: default;
  }

  .expression-area {
    width: 100%;
    min-height: 64px;
    background: var(--surface);
    border: 1px solid #2a2a3a;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem;
    color: var(--text);
    animation: fadeUp 0.5s ease-out 0.35s both;
    flex-wrap: wrap;
    gap: 8px;
  }

  .expr-token { padding: 4px 10px; border-radius: 8px; transition: all 0.2s; }
  .expr-number { background: rgba(240, 192, 64, 0.1); color: var(--gold); }
  .expr-op { color: var(--text-dim); }
  .expr-placeholder { color: #555568; font-size: 0.9rem; font-weight: 500; font-family: 'DM Sans', sans-serif; }

  .actions {
    display: flex;
    gap: 10px;
    width: 100%;
    animation: fadeUp 0.5s ease-out 0.4s both;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-undo {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid #2a2a3a;
  }
  .btn-undo:hover { border-color: #4a4a5a; color: var(--text); }

  .btn-hint {
    background: var(--surface);
    color: var(--gold-dim);
    border: 1px solid #2a2a3a;
  }
  .btn-hint:hover { border-color: var(--gold-dim); color: var(--gold); }

  .btn-new {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: var(--bg);
  }
  .btn-new:hover { box-shadow: 0 4px 20px var(--gold-glow); transform: translateY(-1px); }

  .message {
    text-align: center;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 1rem;
  }

  .message.win {
    color: var(--green);
    font-size: 1.3rem;
    font-weight: 700;
    animation: popIn 0.4s ease-out;
  }

  .message.lose { color: var(--red); animation: shake 0.4s ease-out; }
  .message.hint { color: var(--text-dim); font-size: 0.85rem; }

  .history {
    width: 100%;
    animation: fadeUp 0.5s ease-out 0.45s both;
  }

  .history-title {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .history-steps { display: flex; flex-direction: column; gap: 4px; }

  .history-step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
    padding: 6px 12px;
    background: var(--surface);
    border-radius: 8px;
  }

  .hint-label {
    margin-top: 10px;
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .hint-step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--gold);
    padding: 6px 12px;
    background: rgba(240, 192, 64, 0.06);
    border: 1px solid rgba(240, 192, 64, 0.15);
    border-radius: 8px;
    margin-top: 4px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: scale(0.8) rotateY(20deg); }
    to { opacity: 1; transform: scale(1) rotateY(0); }
  }
  .card-reveal { animation: cardReveal 0.4s ease-out both; }
</style>
</head>
<body>

<div class="side-reminder left">
  <div class="factor-label">Ways to make 24</div>
  <div class="factor">2 × 12</div>
  <div class="factor">3 × 8</div>
  <div class="factor">4 × 6</div>
</div>

<div class="side-reminder right">
  <div class="factor-label">Ways to make 24</div>
  <div class="factor">2 × 12</div>
  <div class="factor">3 × 8</div>
  <div class="factor">4 × 6</div>
</div>

<div class="container">
  <div class="header">
    <h1>Make 24</h1>
    <p>Use all four numbers</p>
  </div>

  <div class="inline-reminder">
    <div class="factor">2 × 12</div>
    <div class="factor">3 × 8</div>
    <div class="factor">4 × 6</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="todayCount">0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="streakCount">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="hintTimer">3:00</div>
      <div class="stat-label">Hint</div>
    </div>
  </div>

  <div class="cards cols-4" id="cards"></div>

  <div class="operators">
    <button class="op-btn disabled" onclick="selectOp('+')">+</button>
    <button class="op-btn disabled" onclick="selectOp('−')">−</button>
    <button class="op-btn disabled" onclick="selectOp('×')">×</button>
    <button class="op-btn disabled" onclick="selectOp('÷')">÷</button>
  </div>

  <div class="expression-area" id="expression">
    <span class="expr-placeholder">Pick a number to start</span>
  </div>

  <div class="message hint" id="message"></div>

  <div class="history" id="historySection" style="display:none">
    <div class="history-title">Steps</div>
    <div class="history-steps" id="historySteps"></div>
  </div>

  <div class="actions">
    <button class="btn btn-undo" onclick="undo()">↩ Undo</button>
    <button class="btn btn-hint" onclick="showHint()">💡 Hint</button>
    <button class="btn btn-new" onclick="newGame()">New Deal</button>
  </div>
</div>

<script>
  // ── Constants ──
  const EPS = 1e-9;
  const OPS = [
    { symbol: '+', fn: (a, b) => a + b },
    { symbol: '−', fn: (a, b) => a - b },
    { symbol: '×', fn: (a, b) => a * b },
    { symbol: '÷', fn: (a, b) => Math.abs(b) > EPS ? a / b : null },
  ];

  // ── State ──
  let numbers = [];
  let selectedNumber = null;
  let selectedOp = null;
  let snapshots = [];
  let history = [];
  let total = 0;
  let today = 0;
  let todayDate = '';
  let streak = 0;
  let gameOver = false;
  let nextId = 0;
  let currentSolution = null;
  let hintIndex = 0;

  // ── Activity-based hint timer ──
  // Only counts seconds where student is actively trying (clicking/tapping).
  // Resets on each successful step or new game.
  const HINT_THRESHOLD = 180; // 3 minutes of active effort
  let activeEffortSeconds = 0;
  let lastInteractionTime = 0;
  const IDLE_CUTOFF = 15000; // 15s without interaction = idle, stop counting

  let effortInterval = null;

  function startEffortTimer() {
    if (effortInterval) clearInterval(effortInterval);
    activeEffortSeconds = 0;
    lastInteractionTime = Date.now();
    updateHintTimerUI();
    effortInterval = setInterval(() => {
      if (gameOver) return;
      const now = Date.now();
      if (now - lastInteractionTime < IDLE_CUTOFF) {
        activeEffortSeconds++;
      }
      updateHintTimerUI();
    }, 1000);
  }

  function updateHintTimerUI() {
    const el = document.getElementById('hintTimer');
    if (!el) return;
    if (hintIndex >= 1) {
      el.textContent = '✓';
      el.style.color = 'var(--green)';
      return;
    }
    const remaining = Math.max(0, HINT_THRESHOLD - activeEffortSeconds);
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
    if (remaining <= 0) {
      el.style.color = 'var(--green)';
    } else if (Date.now() - lastInteractionTime >= IDLE_CUTOFF) {
      el.style.color = 'var(--red)';
    } else {
      el.style.color = 'var(--gold)';
    }
  }

  function resetEffortTimer() {
    activeEffortSeconds = 0;
    lastInteractionTime = Date.now();
    updateHintTimerUI();
  }

  function recordInteraction() {
    lastInteractionTime = Date.now();
    updateHintTimerUI();
  }

  // ── Stats persistence ──
  function getTodayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function loadStats() {
    try {
      const s = window.localStorage.getItem('make24stats');
      if (s) {
        const d = JSON.parse(s);
        total = d.total || 0;
        streak = d.streak || 0;
        todayDate = d.todayDate || '';
        today = (todayDate === getTodayStr()) ? (d.today || 0) : 0;
      }
    } catch (e) { /* unavailable */ }
    syncStatsUI();
  }

  function saveStats() {
    const dateStr = getTodayStr();
    if (todayDate !== dateStr) {
      todayDate = dateStr;
      today = 0;
    }
    try {
      window.localStorage.setItem('make24stats', JSON.stringify({
        total, today, todayDate, streak
      }));
    } catch (e) { /* unavailable */ }
    syncStatsUI();
  }

  function syncStatsUI() {
    document.getElementById('todayCount').textContent = today;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('streakCount').textContent = streak;
  }

  // ── Display helper ──
  function fmt(v) {
    if (Number.isInteger(v)) return String(v);
    const r = Math.round(v * 10000) / 10000;
    return String(parseFloat(r.toFixed(4)));
  }

  // ── Solver ──
  function solve24(nums) {
    if (nums.length === 1) {
      return Math.abs(nums[0].val - 24) < EPS ? [] : null;
    }
    for (let i = 0; i < nums.length; i++) {
      for (let j = 0; j < nums.length; j++) {
        if (i === j) continue;
        const remaining = nums.filter((_, k) => k !== i && k !== j);
        const a = nums[i], b = nums[j];
        for (const op of OPS) {
          const result = op.fn(a.val, b.val);
          if (result === null || !isFinite(result)) continue;
          const newEntry = { val: result, label: `(${a.label}${op.symbol}${b.label})` };
          const sub = solve24([...remaining, newEntry]);
          if (sub !== null) {
            return [{
              aLabel: a.label, op: op.symbol, bLabel: b.label, result,
              text: `${a.label} ${op.symbol} ${b.label} = ${fmt(result)}`
            }, ...sub];
          }
        }
      }
    }
    return null;
  }

  function canMake24(rawNums) {
    const nums = rawNums.map(v => ({ val: v, label: fmt(v) }));
    return solve24(nums) !== null;
  }

  function generateSolvable() {
    let attempts = 0;
    while (attempts < 10000) {
      const rawNums = Array.from({ length: 4 }, () => Math.floor(Math.random() * 13) + 1);
      const nums = rawNums.map(v => ({ val: v, label: String(v) }));
      const solution = solve24(nums);
      if (solution !== null) {
        currentSolution = solution;
        return rawNums;
      }
      attempts++;
    }
    currentSolution = [{ text: '1 × 2 = 2' }, { text: '2 × 3 = 6' }, { text: '6 × 4 = 24' }];
    return [1, 2, 3, 4];
  }

  // ── Game actions ──
  function newGame() {
    const rawNums = generateSolvable();
    nextId = 0;
    numbers = rawNums.map(v => ({ value: v, id: nextId++ }));
    selectedNumber = null;
    selectedOp = null;
    snapshots = [];
    history = [];
    hintIndex = 0;
    resetEffortTimer();
    startEffortTimer();
    gameOver = false;
    clearMessage();
    document.getElementById('historySection').style.display = 'none';
    render();
  }

  function selectNumber(idx) {
    if (gameOver) return;
    recordInteraction();

    // Clicking the already-selected card deselects it
    if (selectedNumber === idx && selectedOp === null) {
      selectedNumber = null;
      render();
      return;
    }

    if (selectedNumber === null || selectedOp === null) {
      selectedNumber = idx;
      render();
      return;
    }

    // Second number picked — compute
    if (idx === selectedNumber) return;

    const a = numbers[selectedNumber].value;
    const b = numbers[idx].value;
    const opSymbol = selectedOp;

    let result;
    switch (opSymbol) {
      case '+': result = a + b; break;
      case '−': result = a - b; break;
      case '×': result = a * b; break;
      case '÷':
        if (Math.abs(b) < EPS) {
          showMessage("Can't divide by zero", 'lose');
          selectedOp = null;
          render();
          return;
        }
        result = a / b;
        break;
    }

    // Save snapshot before mutating
    snapshots.push(numbers.map(n => ({ ...n })));

    history.push(`${fmt(a)} ${opSymbol} ${fmt(b)} = ${fmt(result)}`);

    // Replace two cards with result
    const keep = numbers.filter((_, i) => i !== selectedNumber && i !== idx);
    keep.push({ value: result, id: nextId++ });
    numbers = keep;
    selectedNumber = null;
    selectedOp = null;

    if (numbers.length === 1) {
      if (Math.abs(numbers[0].value - 24) < 0.001) {
        gameOver = true;
        total++;
        today++;
        streak++;
        saveStats();
        showMessage('✦ You made 24! ✦', 'win');
      } else {
        gameOver = true;
        streak = 0;
        saveStats();
        showMessage(`Got ${fmt(numbers[0].value)}, not 24`, 'lose');
      }
    } else {
      // Async solvability check so UI doesn't freeze
      const vals = numbers.map(n => n.value);
      setTimeout(() => {
        if (!gameOver && !canMake24(vals)) {
          showMessage('No solution from here — try undoing', 'hint');
        }
      }, 0);
    }

    render();
  }

  function selectOp(op) {
    if (selectedNumber === null || gameOver) return;
    recordInteraction();
    selectedOp = op;
    render();
  }

  // Snapshot-based undo — no value matching needed
  function undo() {
    if (snapshots.length === 0) return;
    recordInteraction();
    numbers = snapshots.pop();
    history.pop();
    selectedNumber = null;
    selectedOp = null;
    gameOver = false;
    clearMessage();
    render();
  }

  // Reveal only the first step, once per puzzle, after 3 min of active effort
  function showHint() {
    if (gameOver || !currentSolution || currentSolution.length === 0) return;
    recordInteraction();
    if (hintIndex >= 1) {
      showMessage('One hint per deal!', 'hint');
      return;
    }
    const remaining = HINT_THRESHOLD - activeEffortSeconds;
    if (remaining > 0) {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      const timeStr = m > 0 ? `${m}m ${s}s` : `${s}s`;
      showMessage(`Hint unlocks after ${timeStr} of trying — keep working!`, 'hint');
      return;
    }
    hintIndex = 1;
    updateHintTimerUI();
    render();
  }

  // ── Rendering ──
  function render() {
    renderCards();
    renderOperators();
    renderExpression();
    renderHistory();
  }

  function renderCards() {
    const container = document.getElementById('cards');
    container.innerHTML = '';
    container.className = `cards cols-${Math.min(numbers.length, 4)}`;
    numbers.forEach((num, idx) => {
      const card = document.createElement('div');
      card.className = 'number-card card-reveal'
        + (selectedNumber === idx ? ' selected' : '')
        + (gameOver ? ' disabled' : '');
      card.style.animationDelay = (idx * 0.08) + 's';
      const dv = fmt(num.value);
      card.innerHTML = `
        <span class="corner tl">${dv}</span>
        <span>${dv}</span>
        <span class="corner br">${dv}</span>`;
      if (!gameOver) {
        card.onclick = () => selectNumber(idx);
        card.onmouseover = recordInteraction;
      }
      container.appendChild(card);
    });
  }

  function renderOperators() {
    const enabled = selectedNumber !== null && selectedOp === null && !gameOver;
    document.querySelectorAll('.op-btn').forEach(btn =>
      btn.classList.toggle('disabled', !enabled)
    );
  }

  function renderExpression() {
    const area = document.getElementById('expression');
    if (selectedNumber !== null && selectedOp === null) {
      area.innerHTML = `<span class="expr-token expr-number">${fmt(numbers[selectedNumber].value)}</span>
        <span class="expr-token expr-op">?</span>
        <span class="expr-placeholder">pick an operator</span>`;
    } else if (selectedNumber !== null && selectedOp !== null) {
      area.innerHTML = `<span class="expr-token expr-number">${fmt(numbers[selectedNumber].value)}</span>
        <span class="expr-token expr-op">${selectedOp}</span>
        <span class="expr-placeholder">pick second number</span>`;
    } else {
      area.innerHTML = `<span class="expr-placeholder">${gameOver ? 'Deal new cards to play again' : 'Pick a number to start'}</span>`;
    }
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const stepsEl = document.getElementById('historySteps');

    if (history.length === 0 && hintIndex === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';

    let html = history.map((t, i) =>
      `<div class="history-step">${i + 1}. ${t}</div>`
    ).join('');

    if (hintIndex > 0 && currentSolution) {
      html += `<div class="hint-label">Solution hint</div>`;
      for (let i = 0; i < Math.min(hintIndex, currentSolution.length); i++) {
        html += `<div class="hint-step">${currentSolution[i].text}</div>`;
      }
    }

    stepsEl.innerHTML = html;
  }

  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = 'message ' + (type || '');
  }

  function clearMessage() {
    const msg = document.getElementById('message');
    msg.textContent = '';
    msg.className = 'message';
  }

  // ── Keyboard shortcuts (guarded against input fields) ──
  document.addEventListener('keydown', (e) => {
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;

    if (e.key === '+' || e.key === '=') selectOp('+');
    else if (e.key === '-') selectOp('−');
    else if (e.key === '*' || e.key === 'x') selectOp('×');
    else if (e.key === '/') { e.preventDefault(); selectOp('÷'); }
    else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
    else if (e.key === 'n') newGame();
    else if (e.key === 'h') showHint();
    else if (e.key === 'Escape') { selectedNumber = null; selectedOp = null; render(); }
    else if (e.key >= '1' && e.key <= '4' && numbers.length >= parseInt(e.key)) {
      selectNumber(parseInt(e.key) - 1);
    }
  });

  // ── Init ──
  loadStats();
  newGame();
</script>
</body>
</html>
